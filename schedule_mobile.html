<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>The Event Chronology | CREATRICKS 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&amp;family=Hanken+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#32353c",
                    "surface-container-high": "#272a31",
                    "on-tertiary-container": "#3a4559",
                    "on-tertiary-fixed": "#111c2d",
                    "secondary": "#b9c8de",
                    "primary": "#f2ca50",
                    "on-secondary-fixed-variant": "#39485a",
                    "on-error-container": "#ffdad6",
                    "on-secondary-fixed": "#0d1c2d",
                    "surface-tint": "#e9c349",
                    "on-primary-container": "#554300",
                    "tertiary-container": "#a8b3ca",
                    "tertiary-fixed-dim": "#bcc7de",
                    "primary-container": "#d4af37",
                    "tertiary": "#c3cee6",
                    "primary-fixed-dim": "#e9c349",
                    "background": "#000000",
                    "surface-dim": "#10131a",
                    "outline-variant": "#4d4635",
                    "on-surface": "#e1e2eb",
                    "on-secondary-container": "#a7b6cc",
                    "secondary-fixed": "#d4e4fa",
                    "surface-container-highest": "#32353c",
                    "primary-fixed": "#ffe088",
                    "secondary-container": "#39485a",
                    "on-surface-variant": "#d0c5af",
                    "surface-container": "#1d2026",
                    "secondary-fixed-dim": "#b9c8de",
                    "on-tertiary": "#263143",
                    "error-container": "#93000a",
                    "error": "#ffb4ab",
                    "on-primary-fixed": "#241a00",
                    "inverse-on-surface": "#2e3037",
                    "surface-bright": "#363940",
                    "surface-container-lowest": "#0b0e14",
                    "on-secondary": "#233143",
                    "inverse-surface": "#e1e2eb",
                    "surface-container-low": "#191c22",
                    "surface": "#10131a",
                    "tertiary-fixed": "#d8e3fb",
                    "on-primary": "#3c2f00",
                    "outline": "#99907c",
                    "on-tertiary-fixed-variant": "#3c475a",
                    "inverse-primary": "#735c00",
                    "on-error": "#690005",
                    "on-primary-fixed-variant": "#574500",
                    "on-background": "#e1e2eb"
            },
            "fontFamily": {
                    "headline-xl": ["Playfair Display"],
                    "headline-md": ["Playfair Display"],
                    "headline-lg": ["Playfair Display"],
                    "body-md": ["Hanken Grotesk"],
                    "label-caps": ["Hanken Grotesk"],
                    "body-lg": ["Hanken Grotesk"]
            }
          },
        },
      }
    </script>
<style>
    body {
        background: #000;
        -webkit-tap-highlight-color: transparent;
    }
    .active-chip {
        background-color: #f2ca50 !important;
        color: #000000 !important;
        border-color: #f2ca50 !important;
    }
    /* Hide scrollbar rendering across modern touch browsers */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Custom Hamburger Menu & Drawer Styles */
    .hamburger {
        background: none;
        border: none;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding: 8px;
        z-index: 1001;
        position: relative;
    }

    .hamburger span {
        width: 24px;
        height: 2px;
        background: #f2ca50; /* Matched theme primary color */
        display: block;
        transition: all 0.3s ease;
    }

    .hamburger.open span:nth-child(1) {
        transform: translateY(7px) rotate(45deg);
    }

    .hamburger.open span:nth-child(2) {
        opacity: 0;
    }

    .hamburger.open span:nth-child(3) {
        transform: translateY(-7px) rotate(-45deg);
    }

    .nav-drawer {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 30px;
        transform: translateX(100%);
        transition: transform 0.35s cubic-bezier(0.77,0,0.175,1);
        z-index: 1000;
    }

    .nav-drawer.open {
        transform: translateX(0);
    }

    .nav-drawer a {
        color: white;
        text-decoration: none;
        font-size: 1.2rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        transition: color 0.2s;
    }

    .nav-drawer a:hover {
        color: #f2ca50;
    }
</style>
</head>
<body class="text-on-background min-h-screen antialiased">

<div class="max-w-md mx-auto min-h-screen flex flex-col bg-background shadow-xl relative pb-12">
    
    <header class="w-full sticky top-0 bg-background/90 backdrop-blur-md border-b border-outline-variant/60 z-50">
        <div class="flex justify-between items-center px-4 h-14 w-full">
            <div class="flex items-center gap-3">
                <img alt="Creatricks Logo" class="h-8 w-auto object-contain" src="newlogo.png"/>
                <span class="font-headline-sm text-sm uppercase tracking-[0.2em] text-primary font-bold">
                    Creatricks 2026
                </span>
            </div>
            <button class="hamburger -mr-2" id="hamburger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <nav class="nav-drawer" id="navDrawer">
        <a href="#">Home</a>
        <a href="#">Competitions</a>
        <a href="#">Schedule</a>
        <a href="#">Archives</a>
        <a href="#">Contact</a>
    </nav>

    <main class="flex-grow px-4 pt-6">
        <section class="text-center mb-6">
            <div class="mb-2 inline-block px-3 py-0.5 border border-primary/30 bg-primary/5 rounded-full">
                <span class="font-label-caps text-[10px] text-primary uppercase tracking-[0.15em]">JULY 24TH, 2026</span>
            </div>
            <h1 class="font-headline-xl text-3xl text-on-surface font-bold">
                Event <span class="italic text-primary font-normal">Chronology</span>
            </h1>
            <p class="text-xs text-on-surface-variant mt-1.5">Friday Timeline Block Agenda</p>
        </section>

        <section class="mb-6 -mx-4 px-4 overflow-x-auto no-scrollbar flex items-center gap-2" id="filter-bar">
            <button onclick="filterCategory('all')" id="chip-all" class="active-chip shrink-0 px-3 py-1.5 rounded-full border border-outline/40 text-xs font-semibold bg-surface-container transition-all">
                All Tracks
            </button>
        </section>

        <section class="relative border-l border-outline-variant/40 ml-3 pl-5 space-y-6" id="timeline-stack">
            </section>
    </main>
</div>

<script>
const EVTS=[
  {id:1, s:[8,30], e:[10,30], t:"Luminara — Round 1",      desc:"Initial presentations and project validation.",                  loc:"Classrooms assigned", cat:"luminara"},
  {id:2, s:[9,30], e:[11,0],  t:"Envirospark",                   desc:"Environmental exhibition and active presentation judging rounds.",          loc:"Exhibition Hall",     cat:"envirospark"},
  {id:3, s:[9,30], e:[12,0],  t:"Huenova",                       desc:"Creative talent showcase and digital folklore displays.",                    loc:"Mezzanine Floor",     cat:"huenova"},
  {id:4, s:[9,30], e:[12,0],  t:"Live Bands",                   desc:"Live musical battle tracks running simultaneously.",                        loc:"Amphitheatre",         cat:"bands"},
  {id:5, s:[9,30], e:[14,0],  t:"Phoenix Alley",              desc:"Gaming, snack counters, and custom tech stalls.",                          loc:"Skating Ring",         cat:"stalls"},
  {id:6, s:[9,45], e:[10,45], t:"Morphis — Session 1",           desc:"Technical design and modular rendering evaluations.",                        loc:"Classrooms",          cat:"morphis"},
  {id:7, s:[10,30],e:[12,0],  t:"Luminara — Round 2",        desc:"Mid-day performance and primary auditorium track execution.",                loc:"Auditorium",          cat:"luminara"},
  {id:8, s:[12,0], e:[12,30], t:"Envirospark — Grand Finale",   desc:"Final evaluation and celebratory project presentations on the main stage.",loc:"Main Stage",           cat:"envirospark"},
  {id:9, s:[12,0], e:[13,0],  t:"Morphis — Session 2",           desc:"Concluding operational block and technical wraps for Morphis.",            loc:"Classrooms",          cat:"morphis"},
  {id:10,s:[12,45],e:[13,45], t:"Luminara — Round 3",    desc:"Closing showcases, final jury notes, and formal results distribution.",    loc:"Auditorium",          cat:"luminara"},
];

const CATS={
  luminara:    {color:"#f2ca50", bg:"rgba(242,202,80,0.08)", border:"rgba(242,202,80,0.3)", label:"Luminara"},
  envirospark:{color:"#1D9E75", bg:"rgba(29,158,117,0.08)",  border:"rgba(29,158,117,0.3)",  label:"Envirospark"},
  huenova:     {color:"#b9c8de", bg:"rgba(185,200,222,0.08)", border:"rgba(185,200,222,0.3)", label:"Huenova"},
  bands:       {color:"#D85A30", bg:"rgba(216,90,48,0.08)",   border:"rgba(216,90,48,0.3)",   label:"Live Bands"},
  stalls:      {color:"#378ADD", bg:"rgba(55,138,221,0.08)",  border:"rgba(55,138,221,0.3)",  label:"Stalls"},
  morphis:     {color:"#D4537E", bg:"rgba(212,83,126,0.08)",  border:"rgba(212,83,126,0.3)",  label:"Morphis"},
};

let activeCategory = 'all';

function ft([h,min]){
  const p=h>=12?"PM":"AM", hr=h>12?h-12:(h===0?12:h);
  return `${hr}:${min.toString().padStart(2,"0")} ${p}`;
}

// Build interactive touch chip triggers
const filterBar = document.getElementById('filter-bar');
Object.keys(CATS).forEach(key => {
    const c = CATS[key];
    const btn = document.createElement('button');
    btn.id = `chip-${key}`;
    btn.className = `shrink-0 px-3 py-1.5 rounded-full border border-outline/30 text-xs font-medium text-on-surface-variant bg-surface-container-low transition-all`;
    btn.style.borderColor = `${c.color}25`;
    btn.textContent = c.label;
    btn.onclick = () => filterCategory(key);
    filterBar.appendChild(btn);
});

function filterCategory(catKey) {
    activeCategory = catKey;
    document.querySelectorAll('#filter-bar button').forEach(b => b.classList.remove('active-chip'));
    document.getElementById(`chip-${catKey}`).classList.add('active-chip');
    renderMobileTimeline();
}

function renderMobileTimeline() {
    const container = document.getElementById('timeline-stack');
    container.innerHTML = '';
    
    // Sorted chronological representation layout placement
    const filtered = EVTS.filter(e => activeCategory === 'all' || e.cat === activeCategory)
                         .sort((a,b) => (a.s[0]*60+a.s[1]) - (b.s[0]*60+b.s[1]));
                         
    if(filtered.length === 0) {
        container.innerHTML = `<p class="text-zinc-500 text-xs text-center py-8">No scheduled slots match this filter.</p>`;
        return;
    }

    filtered.forEach(ev => {
        const c = CATS[ev.cat];
        
        const card = document.createElement('div');
        card.className = "relative bg-surface-container-low border rounded-lg p-4 transition-all duration-200 active:scale-[0.99]";
        card.style.backgroundColor = c.bg;
        card.style.borderColor = c.border;
        
        // Custom left timing pin dot attachment
        const indicator = document.createElement('div');
        indicator.className = "absolute w-3 h-3 rounded-full -left-[26px] top-5 border border-black";
        indicator.style.backgroundColor = c.color;
        card.appendChild(indicator);

        card.innerHTML += `
            <div class="flex items-start justify-between gap-2 mb-1.5">
                <h3 class="font-semibold text-sm text-on-surface leading-tight">${ev.t}</h3>
                <span class="text-[10px] font-bold uppercase px-2 py-0.5 rounded tracking-wide shrink-0" style="background:${c.color}20; color:${c.color}">
                    ${c.label}
                </span>
            </div>
            <div class="flex flex-col gap-1 text-xs text-on-surface-variant mb-2">
                <span class="flex items-center gap-1 font-medium" style="color: ${c.color}">
                    <span class="material-symbols-outlined text-[14px]">schedule</span>
                    ${ft(ev.s)} – ${ft(ev.e)}
                </span>
                <span class="flex items-center gap-1 opacity-90">
                    <span class="material-symbols-outlined text-[14px]">location_on</span>
                    ${ev.loc}
                </span>
            </div>
            <p class="text-zinc-400 text-xs leading-relaxed border-t border-outline-variant/30 pt-2">${ev.desc}</p>
        `;
        container.appendChild(card);
    });
}

// Hamburger Toggle Logic Execution Engine
const hamburger = document.getElementById('hamburger');
const navDrawer = document.getElementById('navDrawer');

hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('open');
    navDrawer.classList.toggle('open');

    document.body.style.overflow =
    navDrawer.classList.contains('open')
        ? 'hidden'
        : '';
});

document.querySelectorAll('.nav-drawer a').forEach(link => {
    link.addEventListener('click', () => {
        hamburger.classList.remove('open');
        navDrawer.classList.remove('open');
        document.body.style.overflow = '';
    });
});

// Runtime Initialization execution entrypoint
renderMobileTimeline();
</script>
</body>
</html>
