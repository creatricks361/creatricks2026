<script>
const EVTS=[
  {id:1, s:[8,30], e:[10,30], t:"Luminara — Round 1",          desc:"Initial presentations and project validation.",                   loc:"Classrooms assigned", cat:"luminara"},
  {id:2, s:[9,30], e:[11,0],  t:"Envirospark",                  desc:"Environmental exhibition and active presentation judging rounds.",          loc:"Exhibition Hall",     cat:"envirospark"},
  {id:3, s:[9,30], e:[12,0],  t:"Huenova",                      desc:"Creative talent showcase and digital folklore displays.",                    loc:"Mezzanine Floor",     cat:"huenova"},
  {id:4, s:[9,30], e:[12,0],  t:"Live Bands",                   desc:"Live musical battle tracks running simultaneously.",                        loc:"Amphitheatre",        cat:"bands"},
  {id:5, s:[9,30], e:[14,0],  t:"Phoenix Alley",             desc:"Gaming, snack counters, and custom tech stalls.",                          loc:"Skating Ring",        cat:"stalls"},
  {id:6, s:[9,45], e:[10,45], t:"Morphis — Session 1",          desc:"Technical design and modular rendering evaluations.",                      loc:"Classrooms",          cat:"morphis"},
  {id:7, s:[10,30],e:[12,0],  t:"Luminara — Round 2",        desc:"Mid-day performance and primary auditorium track execution.",              loc:"Auditorium",          cat:"luminara"},
  {id:8, s:[12,0], e:[12,30], t:"Envirospark — Grand Finale",   desc:"Final evaluation and celebratory project presentations on the main stage.",loc:"Main Stage",          cat:"envirospark"},
  {id:9, s:[12,0], e:[13,0],  t:"Morphis — Session 2",          desc:"Concluding operational block and technical wraps for Morphis.",            loc:"Classrooms",          cat:"morphis"},
  {id:10,s:[12,45],e:[13,45], t:"Luminara — Round 3",    desc:"Closing showcases, final jury notes, and formal results distribution.",   loc:"Auditorium",          cat:"luminara"},
];

const CATS={
  luminara:   {color:"#f2ca50", bg:"rgba(242,202,80,0.06)", border:"rgba(242,202,80,0.25)", label:"Luminara"},
  envirospark:{color:"#1D9E75", bg:"rgba(29,158,117,0.06)",  border:"rgba(29,158,117,0.25)",  label:"Envirospark"},
  huenova:    {color:"#b9c8de", bg:"rgba(185,200,222,0.06)", border:"rgba(185,200,222,0.25)", label:"Huenova"},
  bands:      {color:"#D85A30", bg:"rgba(216,90,48,0.06)",   border:"rgba(216,90,48,0.25)",   label:"Live Bands"},
  stalls:     {color:"#378ADD", bg:"rgba(55,138,221,0.06)",  border:"rgba(55,138,221,0.25)",  label:"Stalls"},
  morphis:    {color:"#D4537E", bg:"rgba(212,83,126,0.06)",  border:"rgba(212,83,126,0.25)",  label:"Morphis"},
};

const GS=8*60, GE=14*60+30, PPM=3; 
const TH=(GE-GS)*PPM;

function m([h,min]){return h*60+min}
function ft([h,min]){
  const p=h>=12?"PM":"AM", hr=h>12?h-12:(h===0?12:h);
  return `${hr}:${min.toString().padStart(2,"0")} ${p}`;
}

function layout(evts) {
    const sorted = [...evts].sort((a, b) => m(a.s) - m(b.s) || (m(b.e) - m(a.s)) - (m(a.e) - m(a.s)));
    const placed = [];
    
    sorted.forEach(ev => {
        const start = m(ev.s);
        const end = m(ev.e);
        
        let targetCol = 0;
        while (true) {
            const hasOverlap = placed.some(p => {
                return p.col === targetCol && !(end <= m(p.s) || start >= m(p.e));
            });
            if (!hasOverlap) break;
            targetCol++;
        }
        placed.push({ ...ev, col: targetCol });
    });

    placed.forEach(ev => {
        const start = m(ev.s);
        const end = m(ev.e);
        
        let overlappingEvents = placed.filter(other => {
            return !(end <= m(other.s) || start >= m(other.e));
        });
        
        let maxColIndexInCluster = Math.max(...overlappingEvents.map(o => o.col));
        ev.nc = maxColIndexInCluster + 1;
    });
    
    return placed;
}

// Generate Legends
const lgndEl = document.getElementById('lgnd');
Object.values(CATS).forEach(c => {
  const d = document.createElement('div');
  d.className = 'flex items-center gap-2';
  d.innerHTML = `<div class="w-2.5 h-2.5 rounded-sm" style="background:${c.color}"></div><span class="text-xs font-label-caps text-on-surface-variant">${c.label}</span>`;
  lgndEl.appendChild(d);
});

// Setup Matrix Grid Rows
const grid = document.getElementById('cgrid');
const tcol = document.createElement('div');
tcol.className = 'tcol';
tcol.style.height = TH + 'px';
const ea = document.createElement('div');
ea.className = 'earea';
ea.style.height = TH + 'px';

let tHTML = '', eHTML = '';
for (let t = GS; t <= GE; t += 60) {
  const top = (t - GS) * PPM;
  const h = Math.floor(t / 60);
  const lbl = h === 12 ? '12 PM' : h > 12 ? `${h - 12} PM` : `${h} AM`;
  tHTML += `<div class="tlbl" style="top:${top}px">${lbl}</div>`;
  eHTML += `<div class="hln" style="top:${top}px"></div>`;
  if (t + 30 <= GE) eHTML += `<div class="hln-h" style="top:${top + 30 * PPM}px"></div>`;
}
tcol.innerHTML = tHTML;
ea.innerHTML = eHTML;
grid.appendChild(tcol);
grid.appendChild(ea);

const laid = layout(EVTS);

function render() {
  ea.querySelectorAll('.ev').forEach(e => e.remove());
  laid.forEach(ev => {
    const c = CATS[ev.cat];
    const top = (m(ev.s) - GS) * PPM + 2;
    const h = Math.max((m(ev.e) - m(ev.s)) * PPM - 4, 24);
    const nc = ev.nc, col = ev.col;
    const el = document.createElement('div');
    el.className = 'ev';
    
    const pctWidth = 100 / nc;
    const leftPos = col * pctWidth;
    
    el.style.cssText = `top:${top}px;height:${h}px;left:calc(${leftPos}% + 4px);width:calc(${pctWidth}% - 8px);--ea:${c.color};--eb:${c.border};--ebb:${c.bg};z-index:${10 + col};`;
    
    let html = `<div class="ev-t">${ev.t}</div>`;
    if (h > 35) html += `<div class="ev-tm"><span class="material-symbols-outlined" style="font-size:12px">schedule</span>${ft(ev.s)} – ${ft(ev.e)}</div>`;
    if (h > 65) html += `<div class="ev-loc"><span class="material-symbols-outlined" style="font-size:12px">location_on</span>${ev.loc}</div>`;
    if (h > 110) html += `<div class="ev-d">${ev.desc}</div>`;
    
    el.innerHTML = html;
    ea.appendChild(el);
  });
}

render();
</script>
